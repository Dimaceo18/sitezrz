<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ЧТОПОЧЕМ Минск | Рандомайзер мест</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1a0b2e 0%, #0f0719 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* динамический градиентный шум (модный эффект) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255, 45, 145, 0.08) 0px, rgba(160, 32, 240, 0.05) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* главный контейнер — глянцевый кард */
        .glass-card {
            position: relative;
            z-index: 2;
            max-width: 680px;
            width: 100%;
            background: rgba(18, 8, 32, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 1px solid rgba(255, 80, 180, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 70, 200, 0.2), 0 0 20px rgba(191, 0, 255, 0.3);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* хип-хоп / градиентная шапка */
        .hero {
            background: linear-gradient(135deg, #a020f0 0%, #d43f9a 50%, #ff3b7c 100%);
            padding: 32px 24px 28px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 220, 255, 0.5);
        }

        .badge {
            display: inline-block;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffdf9c;
            margin-bottom: 16px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 200, 200, 0.4);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #ffe6f0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.02em;
        }

        .hero h1 span {
            background: none;
            color: #ffec80;
            background-clip: unset;
            -webkit-background-clip: unset;
            text-shadow: 0 0 8px #ff49b0;
        }

        .hero p {
            color: #ffe6f5;
            font-weight: 500;
            margin-top: 12px;
            font-size: 1rem;
            opacity: 0.9;
        }

        /* основная секция с рандомайзером */
        .randomizer-core {
            padding: 40px 28px 36px;
            text-align: center;
        }

        .question-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 4px;
            color: #ff87c0;
            margin-bottom: 12px;
        }

        .idea-card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 48px;
            padding: 32px 20px;
            margin: 12px 0 28px 0;
            border: 1px solid rgba(255, 75, 170, 0.6);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        #randomIdea {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.35;
            color: #fff2f9;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            word-break: break-word;
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* главная кнопка — сочная неоновая */
        .glow-btn {
            background: linear-gradient(95deg, #c72df5, #f53699);
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            padding: 18px 32px;
            border-radius: 100px;
            color: white;
            width: 100%;
            max-width: 380px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 25px rgba(198, 45, 245, 0.4), 0 0 0 1px rgba(255, 200, 255, 0.3);
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .glow-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(198, 45, 245, 0.6);
        }

        /* нижний блок с брендингом и счётчиком */
        .footer-stats {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 20px 24px 24px;
            border-top: 1px solid rgba(255, 100, 180, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .counter-chip {
            background: #2a1042;
            border-radius: 60px;
            padding: 6px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffb3e0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ff5fa0;
        }

        .reset-btn {
            background: rgba(255, 80, 150, 0.2);
            border: 1px solid #ff80b5;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffb7dc;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }

        .reset-btn:hover {
            background: rgba(255, 80, 150, 0.5);
            color: white;
        }

        .brand {
            font-weight: 700;
            background: linear-gradient(125deg, #ff9cef, #ff67ae);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 0.9rem;
        }

        .footnote {
            font-size: 0.7rem;
            color: #b87cae;
            text-align: center;
            width: 100%;
            margin-top: 8px;
        }

        @media (max-width: 550px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            .randomizer-core {
                padding: 28px 18px;
            }
            #randomIdea {
                font-size: 1.3rem;
            }
            .glow-btn {
                font-size: 1.2rem;
                padding: 14px 20px;
            }
            .footer-stats {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }

        /* анимация для появления */
        @keyframes gentlePop {
            0% { opacity: 0; transform: translateY(8px) scale(0.98);}
            100% { opacity: 1; transform: translateY(0) scale(1);}
        }
        .idea-card {
            animation: gentlePop 0.25s ease-out;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="hero">
        <div class="badge">ЧТОПОЧЕМ recommends</div>
        <h1>ЧТОПОЧЕМ <span>МИНСК</span></h1>
        <p>✧ локальный гид по самым вайбовым местам ✧</p>
    </div>

    <div class="randomizer-core">
        <div class="question-tag">⚡ ЧЕМ ЗАНЯТЬСЯ СЕГОДНЯ? ⚡</div>
        <div class="idea-card">
            <div id="randomIdea">
                🎧 нажми на кнопку
            </div>
        </div>
        <button class="glow-btn" id="generateBtn">
            <span>🎲</span> Рандом ✦ ЧТОПОЧЕМ <span>✨</span>
        </button>
        <div style="font-size: 0.7rem; margin-top: 14px; color:#c97eb3;">#минск_что_где_есть</div>
    </div>

    <div class="footer-stats">
        <div class="counter-chip">
            📍 Мест в подборке: <strong id="totalCount">10</strong>
        </div>
        <button id="resetListBtn" class="reset-btn">⟳ сбросить список</button>
        <div class="brand">блогер ЧТОПОЧЕМ • фирменный стиль</div>
        <div class="footnote">фиолетово-малиновый вайб • минские локации, которые советует команда</div>
    </div>
</div>

<script>
    // ================================================================
    // ★ ФИРМЕННЫЙ СПИСОК ИНТЕРЕСНЫХ МЕСТ МИНСКА (ЧТОПОЧЕМ vibe) ★
    // ================================================================
    let places = [
        "🍷 Бар «Палiтра» на Немиге — вино и арт-вечеринки",
        "🎨 Музей современного искусства «Ў» — крутые инсталляции",
        "☕ Кофейня «Druzi» в Верхнем городе и уютный дворик",
        "📸 Заброшенный водонапорная башня — атмосферное граффити",
        "🎧 Клуб «Барахолка» — винил и рейвы по выходным",
        "🥨 Ресторан «Гранд кафе» в Троицком — дореволюционный шарм",
        "🌿 Парк Янки Купалы и арт-объект «Минские качели»",
        "🛹 Лошицкий парк — усадьба и стикер-ралли от ЧТОПОЧЕМ",
        "🎬 Кинотеатр «Пионер» — авторское кино и попкорн с трюфелем",
        "🧶 Галерея «ДК» — маркет локальных дизайнеров и зины"
    ];

    // оригинальный эталон (для сброса)
    const DEFAULT_PLACES = [
        "🍷 Бар «Палiтра» на Немиге — вино и арт-вечеринки",
        "🎨 Музей современного искусства «Ў» — крутые инсталляции",
        "☕ Кофейня «Druzi» в Верхнем городе и уютный дворик",
        "📸 Заброшенный водонапорная башня — атмосферное граффити",
        "🎧 Клуб «Барахолка» — винил и рейвы по выходным",
        "🥨 Ресторан «Гранд кафе» в Троицком — дореволюционный шарм",
        "🌿 Парк Янки Купалы и арт-объект «Минские качели»",
        "🛹 Лошицкий парк — усадьба и стикер-ралли от ЧТОПОЧЕМ",
        "🎬 Кинотеатр «Пионер» — авторское кино и попкорн с трюфелем",
        "🧶 Галерея «ДК» — маркет локальных дизайнеров и зины"
    ];

    // вспомогательная функция обновления счётчика
    function updateCounterUI() {
        document.getElementById('totalCount').innerText = places.length;
    }

    // функция для отображения случайного места
    function getRandomPlace() {
        if (!places || places.length === 0) {
            return "⚠️ Ой! Места закончились? Добавь новые в список через консоль или сбрось ⚠️";
        }
        const randomIndex = Math.floor(Math.random() * places.length);
        return places[randomIndex];
    }

    // анимация + рендер
    function displayRandomIdea() {
        const ideaElement = document.getElementById('randomIdea');
        if (places.length === 0) {
            ideaElement.innerHTML = "❌ Ни одного места в подборке. Нажми «сбросить список» ❌";
            return;
        }
        const selected = getRandomPlace();
        // микро-эффект "пульсации"
        ideaElement.style.opacity = "0.7";
        setTimeout(() => {
            ideaElement.innerHTML = selected;
            ideaElement.style.opacity = "1";
        }, 60);
        // дополнительный фан: легкая вибрация на кнопке не нужна, но можно добавить флирт
    }

    // сброс до дефолтного списка от ЧТОПОЧЕМ
    function resetToOriginal() {
        places = [...DEFAULT_PLACES];
        updateCounterUI();
        const ideaDiv = document.getElementById('randomIdea');
        // если было пустое сообщение или предупреждение, ставим приятный текст
        if (ideaDiv.innerText.includes("закончились") || ideaDiv.innerText.includes("Ни одного места") || places.length > 0) {
            ideaDiv.innerHTML = "✨ Список обновлён! Снова 10 крутых мест ✨";
        } else {
            ideaDiv.innerHTML = "✨ Нажми на кнопку и узнай, куда двинуть ✨";
        }
        showFloatingMessage("Сброс до фирменной подборки ЧТОПОЧЕМ", "#c242ff");
    }

    // небольшое кастомное уведомление в стиле блогера
    function showFloatingMessage(msg, bgColor = "#b62be0") {
        let toast = document.getElementById('customToast');
        if(!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = bgColor;
            toast.style.backdropFilter = 'blur(12px)';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '60px';
            toast.style.fontWeight = '600';
            toast.style.fontSize = '0.85rem';
            toast.style.zIndex = '1000';
            toast.style.fontFamily = "'Inter', sans-serif";
            toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.3)';
            toast.style.border = '1px solid rgba(255,155,230,0.7)';
            toast.style.pointerEvents = 'none';
            toast.style.transition = 'opacity 0.2s';
            toast.style.opacity = '0';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.backgroundColor = bgColor;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    // инициализация и слушатели
    document.addEventListener('DOMContentLoaded', () => {
        updateCounterUI();
        // установим первоначальный текст
        const ideaElement = document.getElementById('randomIdea');
        if(places.length > 0) {
            ideaElement.innerHTML = "💜 Нажми на кнопку — получи локацию от ЧТОПОЧЕМ 💜";
        } else {
            ideaElement.innerHTML = "💔 Список пуст, нажми сброс";
        }

        const generateBtn = document.getElementById('generateBtn');
        generateBtn.addEventListener('click', (e) => {
            e.preventDefault();
            displayRandomIdea();
            // фиолетово-малиновая вибрация вдохновения (без overuse)
            generateBtn.style.transform = "scale(0.98)";
            setTimeout(() => { generateBtn.style.transform = ""; }, 120);
        });

        const resetBtn = document.getElementById('resetListBtn');
        resetBtn.addEventListener('click', () => {
            resetToOriginal();
        });
    });

    // экстра-фича: если разработчик захочет кастомизировать список прямо на сайте,
    // можно использовать глобальную функцию для обновления подборки (стиль ЧТОПОЧЕМ)
    window.updateMinskPlaces = function(newPlacesArray) {
        if(Array.isArray(newPlacesArray) && newPlacesArray.length > 0) {
            places = [...newPlacesArray];
            updateCounterUI();
            showFloatingMessage(`✅ Теперь в подборке ${places.length} мест!`, "#c15bdd");
            document.getElementById('randomIdea').innerHTML = "✨ Новый сет локаций готов! Жми кнопку ✨";
        } else {
            showFloatingMessage("❌ Ошибка: передайте массив с местами Минска", "#ff4d6d");
        }
    };

    // автоматическое логирование для блогера
    console.log("%c🔥 ЧТОПОЧЕМ Минск рандомайзер загружен! 🔥", "color: #ff66cc; font-size: 16px; font-weight: bold;");
    console.log("Твои места:", places);
    console.log("💡 Используй updateMinskPlaces(новыйМассив) чтобы заменить подборку на свои 10+ дел");

    // добавим микро-динамики: по нажатию на карточку иногда можно скопировать идею, но не обязательно
    // но для стиля сделаем лёгкий hover на idea-card
    const ideaCardDiv = document.querySelector('.idea-card');
    if(ideaCardDiv) {
        ideaCardDiv.addEventListener('mouseenter', () => {
            ideaCardDiv.style.borderColor = "#ff7bcb";
            ideaCardDiv.style.boxShadow = "0 0 12px rgba(200, 80, 220, 0.6)";
        });
        ideaCardDiv.addEventListener('mouseleave', () => {
            ideaCardDiv.style.borderColor = "rgba(255, 75, 170, 0.6)";
            ideaCardDiv.style.boxShadow = "0 15px 35px rgba(0, 0, 0, 0.4)";
        });
    }
</script>
</body>
</html>
